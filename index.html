<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Hub</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .title {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .badge {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: inline-block;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #219150;
        }
    </style>
</head>

<body>

<header>
    <h1>🎓 Scholarship Hub</h1>
    <p>Latest Scholarships Updated Automatically</p>
</header>

<div class="container">
    <h2 id="count">Loading scholarships...</h2>
    <div id="list"></div>
</div>

<script>
fetch("scholarships.json")
.then(res => res.json())
.then(data => {

    let scholarships = data.scholarships || [];

    document.getElementById("count").innerText =
        "Total Scholarships: " + scholarships.length;

    let html = "";

    if (scholarships.length === 0) {
        html = "<p>No scholarships available right now.</p>";
    } else {

        scholarships.forEach(item => {
            html += `
                <div class="card">
                    <span class="badge">SCHOLARSHIP</span>

                    <a class="title" href="${item.link}" target="_blank">
                        ${item.title}
                    </a>

                    <a class="btn" href="${item.link}" target="_blank">
                        Apply Now
                    </a>
                </div>
            `;
        });

    }

    document.getElementById("list").innerHTML = html;
})
.catch(err => {
    document.getElementById("count").innerText = "Error loading data";
    document.getElementById("list").innerHTML =
        "<p style='color:red'>Failed to load scholarships.json</p>";
});
</script>

</body>
</html>
