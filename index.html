<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Hub</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }

        .badge {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <h1>🎓 Scholarship Hub</h1>
    <p>Latest Scholarships Updated Automatically</p>
</header>

<div class="container">
    <h2 id="count"></h2>
    <div id="list"></div>
</div>

<script>
fetch("scholarships.json")
.then(res => res.json())
.then(data => {

    document.getElementById("count").innerText =
        "Total Scholarships: " + data.total_scholarships;

    let html = "";

    data.scholarships.forEach(item => {
        html += `
            <div class="card">
                <span class="badge">NEW</span><br><br>
                <a href="${item.link}" target="_blank">
                    ${item.title}
                </a>
            </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
