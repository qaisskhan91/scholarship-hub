<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scholarships | Scholarship Hub</title>
<meta name="description" content="Browse fully funded scholarships worldwide.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="scholarships.html">Scholarships</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">
<h1>🌍 Scholarship Database</h1>

<input id="search" type="text" placeholder="Search scholarships...">

<div style="margin:15px 0;">
<button onclick="filterCountry('all')">All</button>
<button onclick="filterCountry('UK')">UK</button>
<button onclick="filterCountry('USA')">USA</button>
<button onclick="filterCountry('Germany')">Germany</button>
<button onclick="filterCountry('Europe')">Europe</button>
</div>

<div id="results">Loading...</div>
</div>

<footer>© 2026 Scholarship Hub</footer>

<script>
let all=[];
fetch("scholarships.json")
.then(r=>r.json())
.then(d=>{all=d;show(d);});

function show(data){
const box=document.getElementById("results");
box.innerHTML="";
if(data.length===0){box.innerHTML="<div class='card'>No scholarships found.</div>";return;}
data.forEach(s=>{
box.innerHTML+=`
<div class="card">
<h3>${s.title}</h3>
<p><b>Country:</b> ${s.country}</p>
<p><b>Level:</b> ${s.level}</p>
<p><b>Deadline:</b> <span class="deadline">${s.deadline}</span></p>
<p>${s.description}</p>
<a class="btn" href="${s.link}" target="_blank">Official Website</a>
</div>`;
});
}

document.getElementById("search").addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
show(all.filter(x=>
x.title.toLowerCase().includes(q)||
x.country.toLowerCase().includes(q)||
x.level.toLowerCase().includes(q)
));
});

function filterCountry(c){
if(c==="all"){show(all);return;}
show(all.filter(x=>x.country.toLowerCase()===c.toLowerCase()));
}
</script>
</body>
</html>
