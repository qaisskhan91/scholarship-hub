<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scholarships | Scholarship Hub</title>
<meta name="description" content="Browse fully funded scholarships worldwide.">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="scholarships.html">Scholarships</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
<a href="disclaimer.html">Disclaimer</a>
<a href="terms.html">Terms</a>
</nav>

<div class="container">

<h1>🌍 Scholarship Database</h1>

<p>Browse scholarships by country or search by keyword.</p>

<input id="search" type="text" placeholder="Search scholarships...">

<div style="margin:20px 0;">
<button onclick="filterCountry('all')">All</button>
<button onclick="filterCountry('UK')">UK</button>
<button onclick="filterCountry('USA')">USA</button>
<button onclick="filterCountry('Canada')">Canada</button>
<button onclick="filterCountry('Germany')">Germany</button>
<button onclick="filterCountry('Australia')">Australia</button>
<button onclick="filterCountry('China')">China</button>
<button onclick="filterCountry('Japan')">Japan</button>
<button onclick="filterCountry('Türkiye')">Türkiye</button>
</div>

<div id="results">Loading...</div>

</div>

<footer>

<p>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy.html">Privacy Policy</a> |
<a href="disclaimer.html">Disclaimer</a> |
<a href="terms.html">Terms & Conditions</a>
</p>

<p>© 2026 Scholarship Hub. All Rights Reserved.</p>

</footer>

<script>

let all=[];

fetch("scholarships.json")
.then(r=>r.json())
.then(d=>{
all=d;
show(d);
});

function show(data){

const box=document.getElementById("results");

box.innerHTML="";

if(data.length===0){

box.innerHTML="<div class='card'><h3>No scholarships found.</h3></div>";

return;

}

data.forEach(s=>{

box.innerHTML+=`

<div class="card">

<h2>${s.title}</h2>

<p><strong>Country:</strong> ${s.country}</p>

<p><strong>Degree:</strong> ${s.level}</p>

<p><strong>Deadline:</strong>
<span class="deadline">${s.deadline}</span>
</p>

<p>${s.description}</p>

<a class="btn" href="${s.link}" target="_blank">
Apply Now
</a>

&nbsp;

<a class="btn" href="#">
View Details
</a>

</div>

`;

});

}

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

show(

all.filter(x=>

x.title.toLowerCase().includes(q) ||

x.country.toLowerCase().includes(q) ||

x.level.toLowerCase().includes(q)

)

);

});

function filterCountry(c){

if(c==="all"){

show(all);

return;

}

show(

all.filter(x=>x.country.toLowerCase()===c.toLowerCase())

);

}

</script>

</body>
</html>
