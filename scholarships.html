<script>
let allData = [];

fetch("scholarships.json")
.then(res => res.json())
.then(data => {
    allData = data;
    display(data);
});

function display(data) {
    let container = document.getElementById("scholarshipList");
    container.innerHTML = "";

    data.forEach(item => {
        container.innerHTML += `
        <div class="card">
            <h3>${item.title}</h3>
            <p><b>Country:</b> ${item.country}</p>
            <p><b>Level:</b> ${item.level}</p>
            <p><b>Deadline:</b> ${item.deadline}</p>
            <p>${item.description}</p>
            <a class="btn" href="${item.link}" target="_blank">Apply Now</a>
        </div>
        `;
    });
}

// SEARCH FUNCTION
function searchScholarships(value) {
    let filtered = allData.filter(item =>
        item.title.toLowerCase().includes(value.toLowerCase()) ||
        item.country.toLowerCase().includes(value.toLowerCase()) ||
        item.level.toLowerCase().includes(value.toLowerCase())
    );
    display(filtered);
}
</script>
