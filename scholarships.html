<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scholarships | Scholarship Hub</title>
<meta name="description" content="Browse fully funded scholarships worldwide.">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="scholarships.html">Scholarships</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
<a href="disclaimer.html">Disclaimer</a>
<a href="terms.html">Terms</a>
</nav>

<div class="container">

<h1>🌍 Scholarship Database</h1>

<p>Search scholarships by title, country, degree or funding.</p>

<input id="search" type="text" placeholder="Search scholarships...">

<div style="margin:20px 0;display:flex;flex-wrap:wrap;gap:10px;">

<button onclick="filterCountry('all')">All</button>
<button onclick="filterCountry('United Kingdom')">UK</button>
<button onclick="filterCountry('USA')">USA</button>
<button onclick="filterCountry('Germany')">Germany</button>
<button onclick="filterCountry('Canada')">Canada</button>
<button onclick="filterCountry('Australia')">Australia</button>
<button onclick="filterCountry('Japan')">Japan</button>
<button onclick="filterCountry('China')">China</button>
<button onclick="filterCountry('Türkiye')">Türkiye</button>
<button onclick="filterCountry('South Korea')">South Korea</button>

</div>

<div id="results">
Loading...
</div>

</div>

<footer>

<p>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy.html">Privacy Policy</a> |
<a href="disclaimer.html">Disclaimer</a> |
<a href="terms.html">Terms & Conditions</a>
</p>

<p>© 2026 Scholarship Hub. All Rights Reserved.</p>

</footer>

<script>

let all=[];

fetch("scholarships.json")
.then(response=>response.json())
.then(data=>{
all=data;
show(data);
});

function show(data){

const box=document.getElementById("results");

box.innerHTML="";

if(data.length===0){

box.innerHTML="<div class='card'><h3>No scholarships found.</h3></div>";

return;

}

data.forEach(s=>{

box.innerHTML+=`

<div class="card">

<h2>${s.title}</h2>

<p><strong>Country:</strong> ${s.country}</p>

<p><strong>University:</strong> ${s.university}</p>

<p><strong>Degree:</strong> ${s.degree}</p>

<p><strong>Funding:</strong> ${s.funding}</p>

<p><strong>Status:</strong> ${s.status}</p>

<p><strong>Deadline:</strong>
<span class="deadline">${s.deadline}</span>
</p>

<p>${s.description}</p>

<a class="btn"
href="${s.official_link}"
target="_blank">
Apply Now
</a>

</div>

`;

});

}

document.getElementById("search").addEventListener("input",function(){

const q=this.value.toLowerCase();

show(

all.filter(s=>

s.title.toLowerCase().includes(q) ||

s.country.toLowerCase().includes(q) ||

s.degree.toLowerCase().includes(q) ||

s.funding.toLowerCase().includes(q)

)

);

});

function filterCountry(country){

if(country==="all"){

show(all);

return;

}

show(

all.filter(s=>s.country.toLowerCase()===country.toLowerCase())

);

}

</script>

</body>
</html>
