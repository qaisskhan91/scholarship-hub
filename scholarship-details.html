<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholarship Details | Scholarship Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="scholarships.html">Scholarships</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
<a href="disclaimer.html">Disclaimer</a>
<a href="terms.html">Terms</a>
</nav>

<div class="container">
<div id="content"><h2>Loading scholarship...</h2></div>
</div>

<script>
const id=new URLSearchParams(location.search).get("id");
fetch("scholarships.json")
.then(r=>r.json())
.then(data=>{
 const s=data.find(x=>String(x.id)===String(id));
 const c=document.getElementById("content");
 if(!s){c.innerHTML="<h2>Scholarship not found.</h2>";return;}
 c.innerHTML=`
<h1>${s.title}</h1>
<p><strong>Country:</strong> ${s.country}</p>
<p><strong>University:</strong> ${s.university}</p>
<p><strong>Degree:</strong> ${s.degree}</p>
<p><strong>Funding:</strong> ${s.funding}</p>
<p><strong>Status:</strong> ${s.status}</p>
<p><strong>Deadline:</strong> ${s.deadline}</p>

<h2>Overview</h2>
<p>${s.overview}</p>

<h2>Benefits</h2>
<ul>${s.benefits.map(i=>`<li>${i}</li>`).join("")}</ul>

<h2>Eligibility</h2>
<ul>${s.eligibility.map(i=>`<li>${i}</li>`).join("")}</ul>

<h2>Required Documents</h2>
<ul>${s.documents.map(i=>`<li>${i}</li>`).join("")}</ul>

<h2>Application Process</h2>
<ol>${s.application_process.map(i=>`<li>${i}</li>`).join("")}</ol>

<p><a class="btn" href="${s.official_link}" target="_blank">Apply Now</a></p>
<p><a href="scholarships.html">← Back to Scholarships</a></p>`;
});
</script>

<footer>
<p>© 2026 Scholarship Hub. All Rights Reserved.</p>
</footer>
</body>
</html>
