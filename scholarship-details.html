<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scholarship Details | Scholarship Hub</title>
<meta name="description" content="Scholarship details, benefits, eligibility and application guide.">
<link rel="stylesheet" href="style.css">
<style>
.badge{display:inline-block;background:#2c7;padding:6px 10px;border-radius:20px;color:#fff;margin-bottom:10px}
.info{background:#f7f7f7;padding:15px;border-radius:8px;margin:15px 0}
.section{margin:25px 0}.btn-row a{margin-right:10px}
ul,ol{line-height:1.8}
</style></head><body>
<nav>
<a href="index.html">Home</a>
<a href="scholarships.html">Scholarships</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
<a href="disclaimer.html">Disclaimer</a>
<a href="terms.html">Terms</a>
</nav>
<div class="container"><div id="content"><h2>Loading scholarship...</h2></div></div>
<script>
const id=new URLSearchParams(location.search).get("id");
fetch("scholarships.json").then(r=>r.json()).then(data=>{
const s=data.find(x=>String(x.id)===String(id));
const c=document.getElementById("content");
if(!s){c.innerHTML="<h2>Scholarship not found.</h2><p><a class='btn' href='scholarships.html'>Back</a></p>";return;}
const tags=(s.tags||[]).map(t=>`<span class="badge">${t}</span>`).join(" ");
c.innerHTML=`
${s.featured?'<div class="badge">⭐ Featured Scholarship</div>':''}
<h1>${s.title}</h1>
<div class="info">
<p><strong>Country:</strong> ${s.country}</p>
<p><strong>University:</strong> ${s.university}</p>
<p><strong>Degree:</strong> ${s.degree}</p>
<p><strong>Funding:</strong> ${s.funding}</p>
<p><strong>Status:</strong> ${s.status}</p>
<p><strong>Deadline:</strong> ${s.deadline}</p>
<p><strong>Category:</strong> ${s.category}</p>
</div>
<div class="section"><h2>Description</h2><p>${s.description}</p></div>
<div class="section"><h2>Overview</h2><p>${s.overview||''}</p></div>
<div class="section"><h2>Benefits</h2><ul>${(s.benefits||[]).map(i=>`<li>${i}</li>`).join("")}</ul></div>
<div class="section"><h2>Eligibility</h2><ul>${(s.eligibility||[]).map(i=>`<li>${i}</li>`).join("")}</ul></div>
<div class="section"><h2>Required Documents</h2><ul>${(s.documents||[]).map(i=>`<li>${i}</li>`).join("")}</ul></div>
<div class="section"><h2>Application Process</h2><ol>${(s.application_process||[]).map(i=>`<li>${i}</li>`).join("")}</ol></div>
<div class="section"><h2>Tags</h2>${tags}</div>
<div class="btn-row">
<a class="btn" href="${s.official_link}" target="_blank">Apply Now</a>
<a class="btn" href="scholarships.html">Back to Scholarships</a>
<a class="btn" href="index.html">Home</a>
</div>`;});
</script>
<footer><p><a href="about.html">About</a> | <a href="contact.html">Contact</a> | <a href="privacy.html">Privacy</a> | <a href="disclaimer.html">Disclaimer</a> | <a href="terms.html">Terms</a></p><p>© 2026 Scholarship Hub. All Rights Reserved.</p></footer>
</body></html>
